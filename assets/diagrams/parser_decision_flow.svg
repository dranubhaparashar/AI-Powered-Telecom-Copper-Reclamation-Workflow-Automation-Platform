<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" viewBox="0 0 1100 820" role="img" aria-labelledby="title desc">
<title id="title">Parser and decision flow</title><desc id="desc">PDF extraction, parsing, classification, and conservative decision logic.</desc>
<defs><style>.t{font:700 28px Arial;fill:#172033}.b{fill:#fff;stroke:#334155;stroke-width:2;rx:14}.d{fill:#fef3c7;stroke:#b45309;stroke-width:2}.h{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14}.r{fill:#ffedd5;stroke:#c2410c;stroke-width:2;rx:14}.p{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:14}.x{font:600 16px Arial;fill:#1f2937;text-anchor:middle}.s{font:400 13px Arial;fill:#4b5563;text-anchor:middle}.a{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<rect width="1100" height="820" fill="#f8fafc"/><text x="550" y="44" class="t" text-anchor="middle">ACR/CAPR/CPR Parser and Decision Flow</text>
<rect x="390" y="80" width="320" height="65" class="b"/><text x="550" y="108" class="x">Upload PDF reports</text><text x="550" y="130" class="s">approved, redacted, and validated inputs</text>
<rect x="390" y="185" width="320" height="65" class="b"/><text x="550" y="213" class="x">Extract text with PyMuPDF</text><text x="550" y="235" class="s">surface extraction warnings</text><path d="M550 145 L550 185" class="a"/>
<rect x="390" y="290" width="320" height="65" class="b"/><text x="550" y="318" class="x">Parse metadata, pair rows, counts</text><text x="550" y="340" class="s">retain raw values and source evidence</text><path d="M550 250 L550 290" class="a"/>
<rect x="390" y="395" width="320" height="65" class="b"/><text x="550" y="423" class="x">Normalize status categories</text><text x="550" y="445" class="s">working · review · defect · spare · unknown</text><path d="M550 355 L550 395" class="a"/>
<polygon points="550,500 700,570 550,640 400,570" class="d"/><text x="550" y="559" class="x">Any WKG?</text><text x="550" y="582" class="s">working circuit evidence</text><path d="M550 460 L550 500" class="a"/>
<rect x="40" y="535" width="280" height="72" class="h"/><text x="180" y="565" class="x">HOLD / DO NOT DECOM</text><text x="180" y="588" class="s">resolve active evidence</text><path d="M400 570 L320 570" class="a"/><text x="356" y="556" class="s">Yes</text>
<polygon points="815,500 1010,570 815,640 620,570" class="d"/><text x="815" y="559" class="x">Any review/assigned?</text><text x="815" y="582" class="s">PCF/RCF/CF/95DLC/D1GLC/UNK</text><path d="M700 570 L620 570" class="a"/><text x="660" y="556" class="s">No</text>
<rect x="675" y="690" width="280" height="72" class="r"/><text x="815" y="720" class="x">ENGINEERING REVIEW</text><text x="815" y="743" class="s">validate assignments and uncertainty</text><path d="M815 640 L815 690" class="a"/><text x="836" y="669" class="s">Yes</text>
<rect x="310" y="690" width="280" height="72" class="p"/><text x="450" y="720" class="x">PROCEED CANDIDATE</text><text x="450" y="743" class="s">not operational authorization</text><path d="M680 620 C610 675,540 675,500 690" class="a"/><text x="588" y="666" class="s">No</text>
</svg>
